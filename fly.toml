app = "hearmeout-main"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_APP_URL = "https://hearmeout-main.fly.dev"
    NEXT_PUBLIC_BASE_URL = "https://hearmeout-main.fly.dev"
    NEXT_PUBLIC_DISCORD_CLIENT_ID = "1279582181768957963"
    NEXT_PUBLIC_LIVEKIT_URL = "wss://hearmeout-6ntnbsdm.livekit.cloud"
    NEXT_PUBLIC_TWITCH_CLIENT_ID = "rxmohc28tthq0nudfd6iwx0sgy88dp"

[env]
  DJ_WORKER_URL = "https://hmo-dj-worker.fly.dev"
  NODE_ENV = "production"

[mounts]
  source = "data"
  destination = "/data"
  initial_size = "3gb"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
