app = 'hearmeout-main'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    NEXT_PUBLIC_APP_URL = 'https://hearmeout-main.fly.dev'
    NEXT_PUBLIC_BASE_URL = 'https://hearmeout-main.fly.dev'
    NEXT_PUBLIC_DISCORD_CLIENT_ID = '1279582181768957963'
    NEXT_PUBLIC_TWITCH_CLIENT_ID = 'rxmohc28tthq0nudfd6iwx0sgy88dp'
    NEXT_PUBLIC_LIVEKIT_URL = 'wss://hearmeout-6ntnbsdm.livekit.cloud'

[env]
  NODE_ENV = 'production'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
