name: Deploy to Fly.io

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-main:
    name: Deploy main app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy hearmeout-main
        run: flyctl deploy . --remote-only --config fly.toml --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_MAIN || secrets.FLY_API_TOKEN }}

  deploy-worker:
    name: Deploy DJ worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Ensure hmo-dj-worker data volumes
        run: |
          set -euo pipefail
          flyctl scale count 1 -a hmo-dj-worker --yes
          unattached="$(flyctl volumes list -a hmo-dj-worker --json | jq '[.[] | select(.name == "data" and .region == "iad" and ((.attached_machine_id // "") == ""))] | length')"
          if [ "$unattached" -lt 1 ]; then
            flyctl volume create data -a hmo-dj-worker -r iad -n 1 --size 10 --yes
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKER || secrets.FLY_API_TOKEN }}
      - name: Deploy hmo-dj-worker
        run: flyctl deploy . --remote-only --config worker/fly.toml --strategy immediate --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKER || secrets.FLY_API_TOKEN }}
