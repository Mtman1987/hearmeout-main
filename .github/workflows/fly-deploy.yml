name: Deploy to Fly.io

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-main:
    name: Deploy main app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy hearmeout-main
        run: flyctl deploy . --remote-only --config fly.toml --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_MAIN || secrets.FLY_API_TOKEN }}

  deploy-worker:
    name: Deploy DJ worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy hmo-dj-worker
        run: flyctl deploy . --remote-only --config worker/fly.toml --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKER || secrets.FLY_API_TOKEN }}
